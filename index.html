<!DOCTYPE html>
<html>
<head>
<title>My Azure Lab</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    overflow: hidden;
  }

  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    text-align: center;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.1);
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    border: 1px solid rgba(255, 255, 255, 0.18);
    max-width: 500px;
    animation: fadeIn 1s ease-in;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  h1 {
    font-size: 2.8rem;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    font-weight: 700;
    letter-spacing: 2px;
  }

  p {
    font-size: 1.1rem;
    color: rgba(255, 255, 255, 0.95);
    line-height: 1.6;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    font-weight: 300;
  }

  .info-section {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 2px solid rgba(255, 255, 255, 0.2);
  }

  .info-item {
    margin: 10px 0;
    padding: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .info-item:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .info-label {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.7);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  .info-value {
    font-size: 1.2rem;
    color: #fff;
    font-weight: 600;
    margin-top: 3px;
  }

  .role {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.9);
    margin-top: 8px;
    font-style: italic;
  }

  @media (max-width: 768px) {
    h1 {
      font-size: 2.2rem;
    }

    p {
      font-size: 1rem;
    }

    .container {
      padding: 40px 25px;
    }

    .info-value {
      font-size: 1.2rem;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1></h1>Lab</h1>
  <p class="role">DevOps</p>
  <p>Azure Static Web Apps Deployment</p>
  
  <div class="info-section">
    <div class="info-item">
      <div class="info-label">Zill E Hasnain</div>
    </div>
    
    <div class="info-item">
      <div class="info-label">240551</div>
    </div>
    
    <div class="info-item">
      <div class="info-value">Air University</div>
    </div>
    
    <div class="info-item">
      
      <div class="info-value">Rawalpindi</div>
    </div>
    
  
  </div>
</div>
</body>
</html>
